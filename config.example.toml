# Copy this file and rename it to config.toml, then fill in your values.

"token"="YOUR_BOT_TOKEN_HERE"       # Bot Token จาก https://discord.com/developers
"prefix"="-"                         # prefix ของ command
"app_id"="YOUR_APPLICATION_ID_HERE" # Application ID จาก Discord Developer Portal

[music]
# Options for the music commands
"max_volume"=250        # Max audio volume. Set to -1 for unlimited.
"vote_skip"=true        # whether vote-skipping is enabled
"vote_skip_ratio"=0.5   # the minimum ratio of votes needed to skip a song

[tips]
"github_url"="None"

[chord]
"hcti_api_user_id"="YOUR_HCTI_USER_ID" # User ID จาก https://htmlcsstoimage.com/dashboard
"hcti_api_key"="YOUR_HCTI_API_KEY"     # API Key จาก https://htmlcsstoimage.com/dashboard
